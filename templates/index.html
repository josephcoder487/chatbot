<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <!-- MOBILE RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="app">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">

            <div class="logo">
                M A R V O - 3
            </div>

            <button class="nav active">Home</button>
            <button class="nav">Chats</button>
            <button class="nav">History</button>
            <button class="nav">Settings</button>

            <div class="account">

                <p class="account-title">
                    Account
                </p>

                <button class="login-btn">
                    Log in
                </button>

                <button class="google-btn" onclick="loginWithGoogle()">
                    Sign in with Google
                </button>

            </div>

        </aside>

        <!-- VERTICAL LINE -->
        <hr class="v-line">

        <!-- CHAT AREA -->
        <div class="chat">

            <h2 class="chat-title">
                M A R V O
            </h2>

            <div id="box"></div>

            <div class="input-area">

                <input
                    id="msg"
                    placeholder="What's on your mind..."
                    onkeydown="handleKey(event)"
                >

                <button onclick="send()" id="ask">
                    Ask
                </button>

            </div>

            <button onclick="loginWithGoogle()" id="main">
                Sign in with Google
            </button>

        </div>

    </div>

<script>

function send() {

    let input = document.getElementById("msg");
    let box = document.getElementById("box");
    let btn = document.getElementById("ask");

    let m = input.value.trim();

    if (m === "") return;

    box.innerHTML += `
        <p><b>You:</b> ${m}</p>
    `;

    input.value = "";

    let typing = document.createElement("p");

    typing.id = "typing";

    typing.innerHTML = `
        <b>Marvo:</b> typing...
    `;

    box.appendChild(typing);

    btn.disabled = true;

    fetch("/chat", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: m
        })

    })

    .then(r => r.json())

    .then(d => {

        document.getElementById("typing").remove();

        box.innerHTML += `
            <p><b>Marvo:</b> ${d.reply}</p>
        `;

        box.scrollTop = box.scrollHeight;

        btn.disabled = false;

    })

    .catch((err) => {

        document.getElementById("typing").remove();

        box.innerHTML += `
            <p><b>Bot:</b> ${err}</p>
        `;

        console.error(err);

        btn.disabled = false;

    });

}

function handleKey(event) {

    if (event.key === "Enter") {

        event.preventDefault();

        send();

    }

}

function loginWithGoogle() {

    window.location.href = "/auth";

}
function toggleSidebar() {

    let sidebar = document.getElementById("sidebar");

    sidebar.classList.toggle("show");

}

</script>

</body>
</html>
